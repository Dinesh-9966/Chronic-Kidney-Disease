<!DOCTYPE html>
<html>
<head>
    <title>Kidney Disease Prediction</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 30px auto;
            width: 500px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 4px;
        }
        button {
            padding: 10px;
            margin: 5px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
        .auto {
            background: green;
        }
        h2 {
            color: red;
        }
    </style>

    <script>
        function autofill() {
            let values = [
                48,80,1.02,1,0,
                1,1,0,0,121,
                36,1.2,135,4.5,15,
                44,7800,5.2,
                1,1,0,1,0,0
            ];

            let inputs = document.querySelectorAll("input");
            for (let i = 0; i < inputs.length; i++) {
                inputs[i].value = values[i];
            }
        }
    </script>
</head>

<body>

<div class="container">
    <h1>Kidney Disease Prediction</h1>

    <button class="auto" onclick="autofill()">Auto Fill Demo</button>

    <form action="/predict" method="post">
        <input name="age" placeholder="Age">
        <input name="bp" placeholder="Blood Pressure">
        <input name="sg" placeholder="Specific Gravity">
        <input name="al" placeholder="Albumin">
        <input name="su" placeholder="Sugar">

        <input name="rbc" placeholder="RBC (0/1)">
        <input name="pc" placeholder="Pus Cell (0/1)">
        <input name="pcc" placeholder="Pus Cell Clumps (0/1)">
        <input name="ba" placeholder="Bacteria (0/1)">
        <input name="bgr" placeholder="Blood Glucose">

        <input name="bu" placeholder="Blood Urea">
        <input name="sc" placeholder="Serum Creatinine">
        <input name="sod" placeholder="Sodium">
        <input name="pot" placeholder="Potassium">
        <input name="hemo" placeholder="Hemoglobin">

        <input name="pcv" placeholder="Packed Cell Volume">
        <input name="wc" placeholder="WBC Count">
        <input name="rc" placeholder="RBC Count">

        <input name="htn" placeholder="Hypertension (0/1)">
        <input name="dm" placeholder="Diabetes (0/1)">
        <input name="cad" placeholder="CAD (0/1)">
        <input name="appet" placeholder="Appetite (0/1)">
        <input name="pe" placeholder="Pedal Edema (0/1)">
        <input name="ane" placeholder="Anemia (0/1)">

        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <h2>Result: {{ result }}</h2>
    {% endif %}
</div>

</body>
</html>
